<div class="cb-root">
  <button class="cb-launcher" aria-label="Open chat">
    <span class="msi" style="font-size:28px">chat</span>
  </button>
  <section class="cb-panel" role="dialog" aria-label="Civic Concierge assistant">
    <div class="cb-header">
      <div class="avatar">CC</div>
      <div>
        <div class="title">Concierge Assistant</div>
        <div class="subtitle"><span class="open-now-pill"></span></div>
      </div>
      <button class="close" aria-label="Close"><span class="msi">close</span></button>
    </div>
    <div class="cb-messages" aria-live="polite"></div>
    <div class="cb-quick"></div>
    <form class="cb-input">
      <input type="text" placeholder="Type a message..." autocomplete="off" />
      <button type="submit" aria-label="Send"><span class="msi">send</span></button>
    </form>
  </section>
</div>
