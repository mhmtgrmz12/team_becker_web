<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Chat with the concierge — Civic Concierge</title>
  <meta name="description" content="Open a full-screen chat with our concierge assistant for fast answers about vehicle registration in Rheine." />
  <meta name="robots" content="noindex,follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary:"#041627","primary-container":"#1a2b3c",secondary:"#545f72","secondary-container":"#d5e0f7","tertiary-fixed":"#6ffbbe","on-tertiary-fixed":"#002113","on-primary":"#ffffff",surface:"#f7f9fc","surface-container-lowest":"#ffffff","surface-container-low":"#f2f4f7","surface-container-highest":"#e0e3e6"}, fontFamily:{sans:["Inter","ui-sans-serif","system-ui"]} } } };</script>
  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <style>
    /* Override: make cb-panel full screen here */
    .cb-panel { position: relative; right: auto; bottom: auto; width: 100%; max-width: 720px; height: calc(100vh - 200px); min-height: 480px; margin: 0 auto; opacity: 1; transform: none; pointer-events: auto; }
    .cb-launcher { display: none; }
  </style>
</head>
<body class="font-sans">
  <div data-include="/partials/header.html"></div>

  <main class="px-6 py-10">
    <div class="max-w-3xl mx-auto">
      <div class="text-center mb-6">
        <div class="text-xs font-bold uppercase tracking-widest mb-2" style="color:var(--secondary)">Assistant</div>
        <h1 class="text-3xl md:text-4xl font-bold tracking-tight" style="color:var(--primary)">Ask the concierge</h1>
        <p class="mt-2" style="color:var(--secondary)">Quick answers, or we'll prepare a WhatsApp request for you.</p>
      </div>
      <div class="cb-root">
        <button class="cb-launcher" aria-label="Open chat"><span class="msi">chat</span></button>
        <section class="cb-panel open" role="dialog" aria-label="Civic Concierge assistant">
          <div class="cb-header">
            <div class="avatar">CC</div>
            <div>
              <div class="title">Concierge Assistant</div>
              <div class="subtitle"><span class="open-now-pill"></span></div>
            </div>
          </div>
          <div class="cb-messages" aria-live="polite"></div>
          <div class="cb-quick"></div>
          <form class="cb-input">
            <input type="text" placeholder="Type a message..." autocomplete="off" />
            <button type="submit" aria-label="Send"><span class="msi">send</span></button>
          </form>
        </section>
      </div>
    </div>
  </main>

  <div data-include="/partials/footer.html"></div>
  <div data-include="/partials/bottom-nav.html"></div>
  <div data-include="/partials/cookie-banner.html"></div>

  <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
