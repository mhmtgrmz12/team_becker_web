<div class="cb-root">
  <button class="cb-launcher" aria-label="Open chat" data-i18n-attr="aria-label:chatbot.openAria">
    <span class="msi" style="font-size:28px">chat</span>
  </button>
  <section class="cb-panel" role="dialog" aria-label="Civic Concierge assistant" data-i18n-attr="aria-label:chatbot.dialogAria">
    <div class="cb-header">
      <div class="avatar" data-i18n-skip>CC</div>
      <div>
        <div class="title" data-i18n="chatbot.title">Concierge Assistant</div>
        <div class="subtitle"><span class="open-now-pill"></span></div>
      </div>
      <button class="close" aria-label="Close" data-i18n-attr="aria-label:chatbot.closeAria"><span class="msi">close</span></button>
    </div>
    <div class="cb-messages" aria-live="polite"></div>
    <div class="cb-quick"></div>
    <form class="cb-input">
      <input type="text" placeholder="Type a message..." autocomplete="off" data-i18n-attr="placeholder:chatbot.inputPlaceholder" />
      <button type="submit" aria-label="Send" data-i18n-attr="aria-label:chatbot.sendAria"><span class="msi">send</span></button>
    </form>
  </section>
</div>
