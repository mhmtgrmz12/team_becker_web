<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Required documents — Civic Concierge</title>
  <meta name="description" content="Every document you need for vehicle registration in Rheine — ID, eVB, SEPA, Zulassungsbescheinigung, and more." />
  <link rel="canonical" href="https://civic-concierge.de/documents/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary:"#041627","primary-container":"#1a2b3c",secondary:"#545f72","secondary-container":"#d5e0f7","tertiary-fixed":"#6ffbbe","on-tertiary-fixed":"#002113","on-primary":"#ffffff",surface:"#f7f9fc","surface-container-lowest":"#ffffff","surface-container-low":"#f2f4f7","surface-container-highest":"#e0e3e6"}, fontFamily:{sans:["Inter","ui-sans-serif","system-ui"]} } } };</script>
  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body class="font-sans">
  <div data-include="/partials/header.html"></div>

  <main>
    <section class="pt-14 pb-10 px-6">
      <div class="max-w-4xl mx-auto text-center">
        <div class="text-xs font-bold uppercase tracking-widest mb-3" style="color:var(--secondary)" data-i18n="documents.pageEyebrow">Documents</div>
        <h1 class="text-4xl md:text-6xl font-bold tracking-tight" style="color:var(--primary)" data-i18n="documents.pageTitle">Bring the right paperwork — once</h1>
        <p class="mt-4 text-lg" style="color:var(--secondary)" data-i18n="documents.pageSubtitle">Every document we ask for, what it looks like, and why it matters. Filter by service to see only what applies to you.</p>
      </div>
    </section>

    <section class="pb-6 px-6">
      <div class="max-w-5xl mx-auto flex flex-wrap gap-2 justify-center" id="doc-chips"></div>
    </section>

    <section class="pb-20 px-6">
      <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="doc-grid"></div>
    </section>

    <section class="py-16 px-6" style="background:var(--surface-container-low)">
      <div class="max-w-3xl mx-auto text-center">
        <h2 class="text-3xl font-bold tracking-tight" style="color:var(--primary)" data-i18n="documents.lostDocTitle">Lost a document?</h2>
        <p class="mt-3" style="color:var(--secondary)" data-i18n="documents.lostDocSub">Tell us what's missing — we'll tell you the fastest recovery path.</p>
        <a href="/request/" class="inline-flex items-center gap-2 mt-6 px-7 py-4 rounded-xl font-bold" style="background:var(--tertiary-fixed);color:var(--on-tertiary-fixed);box-shadow:var(--shadow-glow)">
          <span class="msi">chat</span> <span data-i18n="documents.tellUs">Tell us on WhatsApp</span>
        </a>
      </div>
    </section>
  </main>

  <div data-include="/partials/footer.html"></div>
  <div data-include="/partials/bottom-nav.html"></div>
  <div data-include="/partials/chatbot.html"></div>
  <div data-include="/partials/cookie-banner.html"></div>

  <script type="module" src="/assets/js/app.js"></script>
  <script type="module">
    import { loadJSON, whenI18nReady, create } from "/assets/js/utils.js";

    function T(key, fallback) {
      const fn = window.CCI18n && window.CCI18n.t;
      if (typeof fn === "function") { const v = fn(key); if (v && v !== key) return v; }
      return fallback || key;
    }

    let _services = null, _docs = null;
    let active = "all";
    let chips, grid;

    function styleBtn(btn, isActive) {
      btn.style.cssText = isActive
        ? "background:var(--primary);color:var(--on-primary);border:1px solid var(--primary)"
        : "background:var(--surface-container-lowest);color:var(--primary);border:1px solid rgba(196,198,205,0.3)";
    }

    function renderGrid() {
      if (!grid || !_docs || !_services) return;
      grid.innerHTML = "";
      let visible = _docs;
      if (active !== "all") {
        const svc = _services.find(s => s.id === active);
        visible = _docs.filter(d => (svc?.requiredDocumentIds || []).includes(d.id));
      }
      visible.forEach(d => {
        const title = T(`documents.items.${d.id}.title`, d.title);
        const desc = T(`documents.items.${d.id}.description`, d.description);
        const dlLabel = T("documents.downloadForm", "Download form →");
        grid.appendChild(create("div", { class: "p-6 rounded-2xl flex flex-col", style: "background:var(--surface-container-lowest);box-shadow:var(--shadow-card)" }, [
          create("div", { class: "w-12 h-12 rounded-full flex items-center justify-center mb-4", style: "background:var(--secondary-container);color:var(--primary)", html: `<span class="msi fill">${d.icon}</span>` }),
          create("h3", { class: "text-lg font-bold mb-2", style: "color:var(--primary)" }, title),
          create("p", { class: "text-sm mt-auto", style: "color:var(--secondary)" }, desc),
          d.formUrl ? create("a", { href: d.formUrl, class: "mt-4 text-sm font-semibold inline-flex items-center gap-1", style: "color:var(--on-tertiary-container)" }, dlLabel) : null,
        ]));
      });
    }

    function renderChips() {
      if (!chips || !_services) return;
      chips.innerHTML = "";
      const cats = [{ id: "all", label: T("documents.allServices", "All services") }, ..._services.map(s => ({ id: s.id, label: T(`services.items.${s.id}.shortName`, s.shortName || s.name) }))];
      cats.forEach(c => {
        const btn = create("button", { class: "px-4 py-2 rounded-full text-sm font-semibold" }, c.label);
        styleBtn(btn, active === c.id);
        btn.addEventListener("click", () => {
          active = c.id;
          [...chips.children].forEach((el, i) => styleBtn(el, cats[i].id === active));
          renderGrid();
        });
        chips.appendChild(btn);
      });
    }

    const dataReady = (async () => {
      [_services, _docs] = await Promise.all([
        loadJSON("/assets/data/services.json"),
        loadJSON("/assets/data/documents.json"),
      ]);
      chips = document.getElementById("doc-chips");
      grid = document.getElementById("doc-grid");
    })();

    // Re-render on every language change
    document.addEventListener("language:changed", async () => {
      await dataReady;
      renderChips();
      renderGrid();
    });

    // Initial render — wait for both data and i18n to be ready
    Promise.all([dataReady, whenI18nReady()]).then(() => { renderChips(); renderGrid(); });
  </script>
</body>
</html>
