<div class="cb-consent" role="dialog" aria-label="Cookie and privacy settings" data-i18n-attr="aria-label:cookie.aria">
  <div class="flex items-start gap-3">
    <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background:var(--secondary-container);color:var(--primary)">
      <span class="msi">cookie</span>
    </div>
    <div class="flex-1">
      <div class="font-bold mb-1" style="color:var(--primary)" data-i18n="cookie.title">We respect your privacy</div>
      <p class="text-sm mb-3" style="color:var(--secondary)" data-i18n-html="cookie.description">
        We use a minimum of data to run this site and help you reach us on WhatsApp.
        Optional analytics are off by default. See our <a href="/legal/privacy/" style="color:var(--on-tertiary-container);text-decoration:underline">privacy policy</a>.
      </p>
      <div class="flex flex-wrap gap-2">
        <button class="cb-accept-essentials px-4 py-2 rounded-lg text-sm font-semibold" style="background:var(--surface-container-low);color:var(--primary);border:1px solid rgba(196,198,205,0.3)" data-i18n="cookie.essentialsOnly">Essentials only</button>
        <button class="cb-accept-all px-4 py-2 rounded-lg text-sm font-semibold" style="background:var(--tertiary-fixed);color:var(--on-tertiary-fixed)" data-i18n="cookie.acceptAll">Accept all</button>
      </div>
    </div>
  </div>
</div>
