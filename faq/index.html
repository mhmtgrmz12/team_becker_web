<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>FAQ — Civic Concierge</title>
  <meta name="description" content="Frequently asked questions about vehicle registration in Rheine — pricing, timing, documents, plates, payment." />
  <link rel="canonical" href="https://civic-concierge.de/faq/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary:"#041627","primary-container":"#1a2b3c",secondary:"#545f72","secondary-container":"#d5e0f7","tertiary-fixed":"#6ffbbe","on-tertiary-fixed":"#002113","on-primary":"#ffffff",surface:"#f7f9fc","surface-container-lowest":"#ffffff","surface-container-low":"#f2f4f7","surface-container-highest":"#e0e3e6"}, fontFamily:{sans:["Inter","ui-sans-serif","system-ui"]} } } };</script>
  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body class="font-sans">
  <div data-include="/partials/header.html"></div>

  <main>
    <section class="pt-14 pb-10 px-6">
      <div class="max-w-4xl mx-auto text-center">
        <div class="text-xs font-bold uppercase tracking-widest mb-3" style="color:var(--secondary)" data-i18n="faq.pageEyebrow">FAQ</div>
        <h1 class="text-4xl md:text-6xl font-bold tracking-tight" style="color:var(--primary)" data-i18n="faq.pageTitle">Answers, without the jargon</h1>
        <p class="mt-4 text-lg" style="color:var(--secondary)" data-i18n="faq.pageSubtitle">The questions we hear most — grouped, searchable, and answered in plain language.</p>
      </div>
    </section>

    <section class="pb-4 px-6">
      <div class="max-w-3xl mx-auto">
        <label class="block text-sm font-semibold mb-2" style="color:var(--primary)" for="faq-search" data-i18n="faq.searchLabel">Search</label>
        <input id="faq-search" type="search" data-i18n-attr="placeholder:faq.searchPlaceholder" placeholder="e.g. 'how much', 'documents', 'wunschkennzeichen'" class="w-full px-5 py-3 rounded-xl" style="background:var(--surface-container-lowest);border:1px solid rgba(196,198,205,0.3);color:var(--on-surface)" />
      </div>
    </section>

    <section class="pt-6 pb-6 px-6">
      <div class="max-w-3xl mx-auto flex flex-wrap gap-2" id="faq-chips"></div>
    </section>

    <section class="pb-20 px-6">
      <div class="max-w-3xl mx-auto space-y-3" id="faq-list"></div>
    </section>

    <section class="py-16 px-6" style="background:var(--surface-container-low)">
      <div class="max-w-3xl mx-auto text-center">
        <h2 class="text-3xl font-bold tracking-tight" style="color:var(--primary)" data-i18n="faq.didntFind">Didn't find your answer?</h2>
        <a href="/request/" class="inline-flex items-center gap-2 mt-6 px-7 py-4 rounded-xl font-bold" style="background:var(--tertiary-fixed);color:var(--on-tertiary-fixed);box-shadow:var(--shadow-glow)">
          <span class="msi">chat</span> <span data-i18n="faq.askOnWa">Ask on WhatsApp</span>
        </a>
      </div>
    </section>
  </main>

  <div data-include="/partials/footer.html"></div>
  <div data-include="/partials/bottom-nav.html"></div>
  <div data-include="/partials/chatbot.html"></div>
  <div data-include="/partials/cookie-banner.html"></div>

  <script type="module" src="/assets/js/app.js"></script>
  <script type="module" src="/assets/js/faq.js"></script>
</body>
</html>
